server.port=8081
spring.application.name=profact-backend

# ===== Database Configuration (Render / Local) =====
# Se usan variables de entorno en producción. Si no existen, usa H2 en local.
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/profactdb}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Consola H2 (accesible en http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== JWT Configuration =====
# Clave secreta para firmar tokens (en produccion usar variable de entorno)
jwt.secret=ProFactSecretKey2024SuperSeguraParaFirmarTokensJWT256BitsMinimo
# Tiempo de expiracion del token en milisegundos (24 horas = 86400000)
jwt.expiration=86400000
